    var t=map[route] || [route,''];
    if(qs('page-title')) qs('page-title').textContent=t[0];
    if(qs('page-subtitle')) qs('page-subtitle').textContent=t[1];
    document.querySelectorAll('[data-route]').forEach(function(b){
      b.classList.toggle('active', b.getAttribute('data-route')===route);
    });
  }
  function fallback(route,msg){
    var c=qs('content'); if(!c) return;
    c.innerHTML='<div class="card menu-fallback-v186"><h3>'+esc((qs('page-title')||{}).textContent||route)+'</h3><p>'+esc(msg||'Menu carregado.')+'</p></div>';
  }
  function inicioSeguro(){
    var c=qs('content'); if(!c) return;
    var user=(window.Auth&&Auth.current&&(Auth.current.nome||Auth.current.login)) || 'Usuário';
    var pacientes=[];
    try{ pacientes=(Store.get('PACIENTES')||[]).filter(function(p){return p.ativo!==false;}); }catch(e){}
    c.innerHTML=
      '<h1 class="zero-page-title">Olá, '+esc(user)+'! 👋</h1>'+
      '<div class="zero-page-sub">'+new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})+'</div>'+
      '<div class="zero-kpi-grid">'+
        '<div class="zero-kpi-card"><div class="zero-kpi-ico blue">🗓️</div><div><div class="zero-kpi-num">0</div><div class="zero-kpi-label">Consultas hoje</div></div></div>'+
        '<div class="zero-kpi-card"><div class="zero-kpi-ico purple">👥</div><div><div class="zero-kpi-num">'+pacientes.length+'</div><div class="zero-kpi-label">Pacientes ativos</div></div></div>'+
      '</div>'+
      '<div class="zero-home-lower"><div class="zero-panel"><div class="zero-panel-head"><div class="zero-panel-title">Atalhos</div></div><div class="zero-panel-body menus-atalhos-v185">'+
      '<button class="btn btn-outline" onclick="Router.go(\'pacientes\')">Pacientes</button>'+
      '<button class="btn btn-outline" onclick="Router.go(\'agenda\')">Agenda Médica</button>'+
      '<button class="btn btn-outline" onclick="Router.go(\'agendaProcedimentos\')">Agenda Procedimentos</button>'+
      '<button class="btn btn-outline" onclick="Router.go(\'atendimento\')">Fila</button>'+
      '</div></div></div>';
  }
  function renderRoute(route){
    route=String(route||'inicio').replace(/\\'/g,'').replace(/'/g,'').trim()||'inicio';
    setTitulo(route);
    var c=qs('content'); if(c) c.innerHTML='';
    try{
      if(route==='inicio'){
        if(window.App && typeof App.renderInicio==='function') App.renderInicio();
        if(c && !String(c.innerHTML||'').trim()) inicioSeguro();
        return true;
      }
      if(route==='atendimento' && window.App && App.renderAtendimento) return App.renderAtendimento();
      if(route==='financeiro' && window.Financeiro && Financeiro.render) return Financeiro.render();
      if(route==='relatorios' && window.Relatorios && Relatorios.render) return Relatorios.render();
      if(route==='agenda' && window.AgendaMedica && AgendaMedica.renderConsultaRoute) return AgendaMedica.renderConsultaRoute();
      if(route==='agendaProcedimentos' && window.AgendaMedica && AgendaMedica.renderProcedimentosRoute) return AgendaMedica.renderProcedimentosRoute();
      if(route==='pacientes' && window.Pacientes && Pacientes.render) return Pacientes.render();
      if(route==='profissionais' && window.Profissionais && Profissionais.render) return Profissionais.render();
      if(route==='backup' && window.Backup && Backup.render) return Backup.render();
      if(route==='storage' && window.ClinicaStorage && ClinicaStorage.renderConfig) return ClinicaStorage.renderConfig();
      if(route==='lgpd' && window.LGPDOffline && LGPDOffline.render) return LGPDOffline.render();
      if(route==='auditoria' && window.Auditoria && Auditoria.render) return Auditoria.render();
      if(route==='auditoriaSistema' && window.AuditoriaSistema && AuditoriaSistema.render) return AuditoriaSistema.render();
      if(route==='supabase' && window.SupabaseConfig && SupabaseConfig.render) return SupabaseConfig.render();
      if(route==='configuracoes' && window.Configuracoes && Configuracoes.render) return Configuracoes.render();
      fallback(route,'Módulo ainda carregando.');
    }catch(e){
      console.error('Erro menu V18.6:',route,e);
      fallback(route,'O menu encontrou erro, mas a navegação foi mantida.');
    }
    setTimeout(function(){
      var cc=qs('content');
      if(cc && !String(cc.innerHTML||'').trim()){
        if(route==='inicio') inicioSeguro();
        else fallback(route,'Menu aberto.');
      }
    },60);
    return true;
  }

  window.CMGoV186=renderRoute;

  function instalarRouterSeguro(){
    if(window.Router){
      Router.go=function(route){ return renderRoute(route); };
    }else{
      window.Router={go:renderRoute,current:'inicio',route:'inicio'};
    }
  }

  instalarRouterSeguro();
  document.addEventListener('click',function(ev){
    var b=ev.target && ev.target.closest ? ev.target.closest('[data-route]') : null;
    if(!b) return;
    ev.preventDefault();
    ev.stopPropagation();
    renderRoute(b.getAttribute('data-route')||'inicio');
    return false;
  },true);

  function watchdog(){
    instalarRouterSeguro();
    var app=qs('app-shell');
    var c=qs('content');
    var login=qs('login-page');
    var appVisivel=app && getComputedStyle(app).display!=='none';
    var loginOculto=!login || getComputedStyle(login).display==='none';
    if(appVisivel && loginOculto && c && !String(c.innerHTML||'').trim()){
      renderRoute((window.Router&&(Router.current||Router.route)) || 'inicio');
    }
  }
  setTimeout(watchdog,250);
  setTimeout(watchdog,700);
  setTimeout(watchdog,1500);
  setInterval(watchdog,2000);

  // Limpa cache/PWA antigo apenas uma vez para não prender JS velho.
  try{
    if('serviceWorker' in navigator && !localStorage.getItem('CM_CACHE_RESET_V186')){
      localStorage.setItem('CM_CACHE_RESET_V186','1');
      navigator.serviceWorker.getRegistrations().then(function(regs){
        return Promise.all(regs.map(function(r){ return r.unregister(); }));
      }).then(function(){
        if(window.caches) return caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){ return caches.delete(k); })); });
      }).then(function(){
        setTimeout(function(){ location.reload(); },300);
      }).catch(function(){});
    }
  }catch(e){}
})();
</script>

/* Clínica Mário — Registro PWA */

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('./service-worker.js')
        .then(function(){ console.log('PWA ativo: service worker registrado.'); })
        .catch(function(err){ console.warn('PWA não registrado:', err); });
    });
  }
})();
</script>
